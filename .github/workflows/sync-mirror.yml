# Keeps the legacy-domain mirror (charles403/excelrealty-legacy-site,
# serving www.excelrealty.us) identical to this repository.
# This repo is the single source of truth: edit here, push, and the
# mirror updates automatically. Requires the MIRROR_TOKEN repo secret
# (a GitHub token with push access to excelrealty-legacy-site).

name: Sync legacy domain mirror

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Don't persist the default GITHUB_TOKEN auth header; it would
          # override MIRROR_TOKEN on the cross-repo push below.
          persist-credentials: false

      - name: Point CNAME at the legacy domain
        run: echo "www.excelrealty.us" > CNAME

      - name: Push to mirror repository
        run: |
          git config user.name "shortcreek-sync"
          git config user.email "actions@users.noreply.github.com"
          git add CNAME
          git commit -m "Sync from shortcreek-realty-site ${GITHUB_SHA::7}"
          git push --force "https://charles403:${{ secrets.MIRROR_TOKEN }}@github.com/charles403/excelrealty-legacy-site.git" HEAD:main
